name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --check
      - name: clippy (default = BM25)
        run: cargo clippy --locked -- -D warnings
      - name: test (default = BM25)
        run: cargo test --locked
      - name: clippy (semantic feature)
        run: cargo clippy --locked --features semantic -- -D warnings
      # モデル取得が必要な e2e は #[ignore] で CI から除外 (ローカルで -- --ignored)
      - name: test (semantic feature)
        run: cargo test --locked --features semantic
      # release の musl 静的ビルドがタグ作成時まで壊れに気づけないのを防ぐ (コンパイル回帰検知)
      - name: install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: check (semantic, musl)
        run: cargo check --locked --features semantic --target x86_64-unknown-linux-musl
