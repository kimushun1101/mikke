name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build (e.g. v0.1.0)'
        required: true

permissions:
  contents: read

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          # musl 完全静的バイナリ: glibc バージョン非依存で任意の distro で動く
          # (esaxx_fast を外したので musl-tools の musl-gcc のみでビルド可能)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - name: validate tag (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          tag="${{ inputs.tag }}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "invalid tag: '$tag' (expected e.g. v0.1.0)"
            exit 1
          fi
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: install musl-tools (musl target)
        if: endsWith(matrix.target, '-musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: check tag matches Cargo.toml version
        shell: bash
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          ver="v$(cargo pkgid | sed 's/.*[@#]//')"
          [ "$TAG" = "$ver" ] || { echo "tag $TAG != Cargo.toml $ver"; exit 1; }
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: build slim (BM25)
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: verify static link (musl slim)
        if: endsWith(matrix.target, '-musl')
        run: file "target/${{ matrix.target }}/release/mikke" | grep -E "static-pie linked|statically linked"
      - name: package slim
        shell: bash
        run: bash .github/scripts/package.sh slim "${{ matrix.target }}"
      - name: build full (semantic)
        run: cargo build --release --locked --features semantic --target ${{ matrix.target }}
      - name: verify static link (musl full)
        if: endsWith(matrix.target, '-musl')
        run: file "target/${{ matrix.target }}/release/mikke" | grep -E "static-pie linked|statically linked"
      - name: package full
        shell: bash
        run: bash .github/scripts/package.sh full "${{ matrix.target }}"
      - uses: actions/upload-artifact@v7
        with:
          name: mikke-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS
          cat SHA256SUMS
      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/*
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: true
