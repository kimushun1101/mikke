name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: build slim (BM25)
        run: cargo build --release --target ${{ matrix.target }}
      - name: stage slim binary
        shell: bash
        run: |
          ext=""; [ "${{ runner.os }}" = "Windows" ] && ext=".exe"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/mikke${ext}" "dist/mikke-slim-${{ matrix.target }}${ext}"
      - name: build full (semantic)
        run: cargo build --release --features semantic --target ${{ matrix.target }}
      - name: stage full binary
        shell: bash
        run: |
          ext=""; [ "${{ runner.os }}" = "Windows" ] && ext=".exe"
          cp "target/${{ matrix.target }}/release/mikke${ext}" "dist/mikke-full-${{ matrix.target }}${ext}"
      - uses: actions/upload-artifact@v7
        with:
          name: mikke-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: list artifacts
        run: ls -la dist
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/*
          fail_on_unmatched_files: true
